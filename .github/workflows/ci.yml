name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      # Phase 4 PR 4.8 — Windows is gating. fail-fast off so a failure on
      # one OS doesn't cancel the others' diagnostics.
      fail-fast: false
      matrix:
        # Pinned versions per phase-4-plan §1: macos-14 + ubuntu-22.04
        # (Phase 1–3 baseline) + windows-2022 (Phase 4 promotion).
        os: [macos-14, ubuntu-22.04, windows-2022]
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Run tests
        run: npm test

      - name: Check SDK type drift (PR 4.9)
        if: matrix.os == 'ubuntu-latest'
        run: npm run check:sdk-drift

<!DOCTYPE html>
<html>
  <head>
    <title>{{title}}</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f172a;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        text-align: center;
        padding: 40px;
      }
      .icon {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: {{bgColor}};
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
      }
      .icon svg {
        width: 32px;
        height: 32px;
        color: {{color}};
      }
      h1 {
        font-size: 24px;
        font-weight: 600;
        color: {{color}};
        margin: 0 0 12px;
      }
      p {
        color: #94a3b8;
        font-size: 14px;
        margin: 0 0 24px;
      }
      .hint {
        color: #64748b;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        {{icon}}
      </div>
      <h1>{{title}}</h1>
      <p>{{message}}</p>
      <p class="hint">You can close this window and return to OS8.</p>
    </div>
  </body>
</html>
